<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menorca BusTalk</title>
    
    <!-- TAILWIND, ALPINE Y FONT-AWESOME -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- WEB MANIFEST PWA EMBEBIDO (Listo para instalar con icono de BusTalk) -->
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTWVub3JjYSBCdXNUYWxrIiwic2hvcnRfbmFtZSI6Ik1lbm9yY2FCdXNUYWxrIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwYTE5MmYiLCJ0aGVtZV9jb2xvciI6IiMwNzEzMjQiLCJvcmllbnRhdGlvbiI6InBvcnRyYWl0LXByaW1hcnkiLCJpY29ucyI6b31d">
    
    <!-- SOPORTE DIRECTO PARA APPLE / IOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BusTalk">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3760/3760137.png">

    <style>
        [x-cloak] { display: none !important; }
        
        body { 
            background-color: #0a192f; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
            padding-top: env(safe-area-inset-top);
        }

        .bg-navy-dark { background-color: #0a192f; }
        .bg-navy-light { background-color: #0f2447; }
        
        .ptt-active { 
            background-color: #ef4444 !important;
            transform: scale(0.96); 
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.8);
        }

        .ptt-receiving {
            background-color: #10b981 !important;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.9);
            animation: pulse-green 1s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .alerta-noshow { background-color: #ea580c; animation: pulse-alert 2s infinite; border-color: #c2410c; }
        .alerta-trafico { background-color: #ca8a04; animation: pulse-alert 2s infinite; border-color: #a16207; }
        .alerta-averia { background-color: #dc2626; animation: pulse-alert 1s infinite; border-color: #991b1b; }

        @keyframes pulse-alert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="busTalkApp()" x-init="init()" class="text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- MOTOR DEL SERVICE WORKER (Para activación e instalación PWA instantánea) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => { e.waitUntil(self.skipWaiting()); });
                    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
                    self.addEventListener('fetch', e => { 
                        // Permite peticiones en tiempo real sin romper la caché de instalación
                        return fetch(e.request);
                    });
                `;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(console.error);
            });
        }
    </script>

    <!-- PANTALLA COMPLETA RECIBIENDO COMUNICADO -->
    <div x-show="estadoRadio === 'recibiendo'" x-transition.opacity class="fixed inset-0 bg-green-500/10 z-[60] pointer-events-none animate-pulse"></div>

    <!-- ACCESO INICIAL / SELECCIÓN DE ENTRADA AL TURNO -->
    <div x-show="!sesionIniciada" x-transition.opacity class="fixed inset-0 bg-[#06101e] z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-navy-light p-8 rounded-[2rem] w-full max-w-sm text-center shadow-2xl border border-slate-800">
            <div class="text-sky-400 text-6xl mb-6"><i class="fas fa-bus"></i><i class="fas fa-headset text-3xl ml-2"></i></div>
            <h2 class="text-2xl font-black mb-2 text-white uppercase tracking-wider">Menorca BusTalk</h2>
            <p class="text-gray-400 mb-6 text-xs">Servicio Discrecional y Rutas Escolares</p>
            
            <input type="number" x-model="miBusInput" placeholder="Nº Conductor / Bus" 
                   class="w-full p-4 mb-4 rounded-2xl bg-[#071426] text-white text-center text-2xl font-black border-2 border-slate-700 focus:border-sky-400 outline-none transition-colors">
            
            <select x-model="miLineaInput" class="w-full p-4 mb-6 rounded-2xl bg-[#071426] text-white text-center text-lg font-bold border-2 border-slate-700 focus:border-sky-400 outline-none appearance-none">
                <option value="Discrecional">Servicio Discrecional</option>
                <option value="Escolar">Ruta Escolar</option>
                <option value="General">Canal General (Flota)</option>
            </select>

            <button @click="iniciarTurno()" class="w-full bg-sky-500 active:bg-sky-600 text-slate-950 font-black text-lg py-5 rounded-2xl transition-transform active:scale-95 shadow-[0_0_20px_rgba(56,189,248,0.3)]">
                CONECTAR CON TRÁFICO
            </button>
        </div>
    </div>

    <!-- CABECERA DE LA APP -->
    <header class="p-4 bg-[#071324] flex justify-between items-center border-b border-slate-800 z-10">
        <div class="flex flex-col">
            <div class="flex items-center space-x-2">
                <span class="bg-sky-500 text-slate-950 font-black px-2 py-0.5 rounded-md text-xs" x-text="'ID ' + miBus"></span>
                <h1 class="text-md font-black tracking-tighter italic text-gray-200">Menorca <span class="text-sky-400">BusTalk</span></h1>
            </div>
            <span class="text-[9px] font-bold text-gray-400 mt-1 uppercase tracking-widest" x-text="'Servicio: ' + miLinea"></span>
        </div>
        <div class="flex items-center space-x-3">
            <div class="flex items-center gap-1.5 bg-navy-dark px-3 py-1.5 rounded-full border border-slate-800">
                <span class="w-2 h-2 rounded-full" :class="conectado ? 'bg-green-500 animate-pulse' : 'bg-red-500'"></span>
                <span class="text-[9px] font-bold tracking-widest uppercase text-gray-300" x-text="conectado ? 'Tráfico Ok' : 'Desconectado'"></span>
            </div>
            <button @click="cerrarTurno()" class="w-9 h-9 bg-navy-dark rounded-full flex items-center justify-center text-gray-400 active:text-red-400 transition-colors border border-slate-800">
                <i class="fas fa-power-off text-sm"></i>
            </button>
        </div>
    </header>

    <!-- RADAR EN TIEMPO REAL: MONITOR DE FLOTA -->
    <main class="flex-1 overflow-y-auto p-3 space-y-3 bg-navy-dark hide-scrollbar pb-6">
        <div class="flex justify-between items-end mb-1 px-1 mt-1">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.15em]">Flota en Servicio Activo</p>
            <p class="text-[9px] text-gray-500 font-bold" x-text="compañeros.length + ' conductores'"></p>
        </div>
        
        <template x-if="compañeros.length === 0 && sesionIniciada">
            <div class="text-center py-12 opacity-25">
                <i class="fas fa-headset text-5xl mb-3 text-sky-400"></i>
                <p class="font-bold text-xs uppercase tracking-widest">Sin incidencias reportadas</p>
            </div>
        </template>

        <template x-for="comp in compañeros" :key="comp.id">
            <div class="p-4 rounded-2xl border-l-4 flex justify-between items-center shadow-md transition-colors"
                 :class="[
                    comp.alerta === 'AVERÍA' ? 'alerta-averia' : 
                    comp.alerta === 'NO SHOW' ? 'alerta-noshow' : 
                    comp.alerta === 'TRÁFICO' ? 'alerta-trafico' : 
                    (comp.id === elQueHabla ? 'border-green-500 bg-green-950/20' : 'border-sky-500 bg-navy-light')
                 ]">
                
                <div class="flex-1">
                    <div class="flex items-center gap-2 mb-1">
                        <p class="font-black text-base text-white" x-text="'Conductor ' + comp.id"></p>
                        <i x-show="comp.id === elQueHabla" class="fas fa-volume-up text-green-400 animate-pulse text-sm ml-1"></i>
                        
                        <span x-show="comp.alerta" class="px-1.5 py-0.5 bg-black/40 text-white rounded text-[8px] font-black uppercase tracking-wider border border-white/10">
                            <i class="fas fa-triangle-exclamation text-yellow-400 mr-1"></i> <span x-text="comp.alerta"></span>
                        </span>
                    </div>

                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded bg-slate-900 text-sky-300 border border-slate-800 flex items-center gap-1">
                            <i class="fas fa-map-marker-alt text-[8px]"></i>
                            <span x-text="comp.ubicacion"></span>
                        </span>
                        <span class="text-[10px] font-bold text-gray-400" x-text="comp.estadoRuta || 'En Ruta'"></span>
                    </div>
                </div>
                
                <div class="text-right bg-black/20 px-3 py-1.5 rounded-xl border border-slate-800 ml-2">
                    <p class="text-[8px] uppercase tracking-widest text-gray-400 font-bold">Pax</p>
                    <span class="text-xl font-black text-sky-400" x-text="comp.pax"></span>
                </div>
            </div>
        </template>
    </main>

    <!-- PANEL DE CONTROL TOTAL EN CABINA -->
    <footer class="p-4 bg-[#071324] rounded-t-[2rem] shadow-[0_-8px_30px_rgba(0,0,0,0.6)] border-t border-slate-800 relative z-20">
        <div class="flex flex-col items-center max-w-md mx-auto">
            
            <!-- ALERTAS DE TRÁFICO -->
            <div class="w-full flex gap-2 mb-3 bg-navy-dark p-1.5 rounded-xl border border-slate-800">
                <button @click="toggleAlerta('NO SHOW')" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase border transition-colors" :class="miAlerta === 'NO SHOW' ? 'bg-orange-600 border-orange-500 text-white' : 'bg-[#0f2447] border-slate-800 text-gray-400'">🚷 No Show</button>
                <button @click="toggleAlerta('TRÁFICO')" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase border transition-colors" :class="miAlerta === 'TRÁFICO' ? 'bg-yellow-600 border-yellow-500 text-white' : 'bg-[#0f2447] border-slate-800 text-gray-400'">🚧 Tráfico</button>
                <button @click="toggleAlerta('AVERÍA')" class="flex-1 py-2 rounded-lg text-[9px] font-black uppercase border transition-colors" :class="miAlerta === 'AVERÍA' ? 'bg-red-600 border-red-500 text-white' : 'bg-[#0f2447] border-slate-800 text-gray-400'">🆘 Avería</button>
            </div>

            <!-- ESTADOS DEL SERVICIO -->
            <div class="w-full flex justify-between gap-1.5 mb-3">
                <template x-for="estado in ['En Camino', 'En Hotel', 'En Ruta', 'Finalizado']">
                    <button @click="actualizarEstadoServicio(estado)" class="flex-1 bg-navy-light py-2.5 rounded-xl text-[9px] font-black uppercase tracking-wider border border-slate-800 active:bg-sky-500 active:text-slate-950 transition-colors" 
                            :class="miEstadoServicio === estado ? 'bg-sky-500 text-slate-950 font-black shadow-[0_0_10px_rgba(56,189,248,0.2)]' : 'text-gray-400'" x-text="estado"></button>
                </template>
            </div>

            <!-- PUNTOS GEOGRÁFICOS Y CONTADOR PAX -->
            <div class="w-full flex gap-3 mb-4">
                <div class="flex-1 bg-navy-dark p-2 rounded-xl border border-slate-800 flex flex-col justify-center">
                    <p class="text-[8px] font-black uppercase tracking-widest text-gray-500 mb-1 pl-1">Zona / Punto actual</p>
                    <input type="text" x-model="miUbicacion" @input.debounce.500ms="actualizarMiEstadoBD()" placeholder="Ej: Hotel / Apt" 
                           class="w-full bg-[#071426] border border-slate-700 rounded-lg py-1 px-2 text-xs text-white uppercase font-bold outline-none focus:border-sky-400 text-center">
                </div>

                <div class="flex-1 bg-navy-dark p-1.5 rounded-xl border border-slate-800 flex items-center justify-between">
                    <button @click="cambiarPasajeros(-1)" class="w-10 h-10 rounded-lg bg-navy-light text-xl flex items-center justify-center active:bg-red-500 text-gray-300 shadow">-</button>
                    <div class="text-center flex-1">
                        <p class="text-[8px] uppercase text-gray-500 font-black tracking-wider">PAX</p>
                        <p class="text-2xl font-black text-sky-400 leading-none" x-text="miPax"></p>
                    </div>
                    <button @click="cambiarPasajeros(1)" class="w-10 h-10 rounded-lg bg-navy-light text-xl flex items-center justify-center active:bg-green-500 text-gray-300 shadow">+</button>
                </div>
            </div>

            <!-- BOTÓN RECTANGULAR ANCHO PTT DE EMISIÓN DE VOZ -->
            <div class="w-full flex items-center gap-3 pb-1">
                <button id="btn-ptt"
                    @mousedown="empezarGrabar()" @mouseup="pararGrabar()" @mouseleave="pararGrabarSiSale()"
                    @touchstart.prevent="empezarGrabar()" @touchend.prevent="pararGrabar()"
                    class="flex-1 h-20 rounded-2xl bg-sky-500 flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(56,189,248,0.15)] transition-all duration-100 relative z-10"
                    :class="{ 'ptt-active': estadoRadio === 'grabando', 'ptt-receiving': estadoRadio === 'recibiendo' }">
                    <i class="fas text-2xl text-slate-950" :class="estadoRadio === 'recibiendo' ? 'fa-volume-high animate-bounce' : 'fa-microphone'"></i>
                    <div class="text-left">
                        <p class="text-slate-950 font-black text-sm tracking-wider uppercase leading-none" x-text="estadoRadio === 'grabando' ? 'TRANSMITIENDO EN DIRECTO' : (estadoRadio === 'recibiendo' ? 'ESCUCHANDO CENTRAL' : 'PULSAR PARA HABLAR')"></p>
                        <p class="text-slate-900 font-bold text-[9px] tracking-widest uppercase mt-1" x-text="'Canal: ' + miLinea"></p>
                    </div>
                </button>

                <!-- REPLAY -->
                <button @click="repetirUltimoAudio()" x-show="ultimoAudio" class="w-14 h-20 rounded-2xl bg-navy-light border border-slate-800 flex flex-col items-center justify-center text-gray-400 active:bg-sky-600 active:text-slate-950 transition-colors" title="Repetir último mensaje">
                    <i class="fas fa-arrow-rotate-left text-sm"></i>
                    <span class="text-[7px] font-black mt-1 tracking-wider">REPLAY</span>
                </button>
            </div>
            
        </div>
    </footer>

    <!-- Sello medbasha de autoría del sistema -->
    <div class="hidden" data-seal="medbasha"></div>

    <!-- NÚCLEO DE LÓGICA Y SINCRONIZACIÓN DE BASE DE DATOS -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7b6_T0ze2HgXiYHfvUeL12JSXE7ZKogc",
            authDomain: "misturnos-fe3ea.firebaseapp.com",
            databaseURL: "https://misturnos-fe3ea-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "misturnos-fe3ea",
            storageBucket: "misturnos-fe3ea.firebasestorage.app",
            messagingSenderId: "1029095925443",
            appId: "1:1029095925443:web:873240d85ac5160f392476"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function busTalkApp() {
            return {
                sesionIniciada: false, conectado: false, wakeLockStatus: null,
                miBusInput: '', miLineaInput: 'Discrecional', 
                miBus: '', miLinea: '', miPax: 0, miUbicacion: '',
                miEstadoServicio: 'En Camino', miAlerta: null,
                compañeros:[],
                
                estadoRadio: 'reposo', elQueHabla: null,
                mediaRecorder: null, chunks:[], streamingMsgId: null, ultimoAudio: null,
                relojUI: null,

                init() {
                    const busGuardado = localStorage.getItem('mb_discrecional_bus');
                    const lineaGuardada = localStorage.getItem('mb_discrecional_linea');
                    if (busGuardado && lineaGuardada) {
                        this.miBusInput = busGuardado;
                        this.miLineaInput = lineaGuardada;
                        this.iniciarTurno();
                    }
                    this.relojUI = setInterval(() => { this.compañeros = [...this.compañeros]; }, 10000);
                },

                async mantenerPantallaDespierta() {
                    if ('wakeLock' in navigator) {
                        try { this.wakeLockStatus = await navigator.wakeLock.request('screen'); } catch (err) {}
                    }
                },

                iniciarTurno() {
                    if (!this.miBusInput || this.miBusInput <= 0) { alert("Introduce tu ID de Conductor o Bus."); return; }
                    this.miBus = this.miBusInput.toString();
                    this.miLinea = this.miLineaInput;
                    
                    localStorage.setItem('mb_discrecional_bus', this.miBus);
                    localStorage.setItem('mb_discrecional_linea', this.miLinea);
                    this.sesionIniciada = true;

                    this.mantenerPantallaDespierta();
                    document.addEventListener('visibilitychange', () => {
                        if (document.visibilityState === 'visible') this.mantenerPantallaDespierta();
                    });

                    this.playAudioAviso('connect');

                    auth.signInAnonymously().then(() => {
                        this.conectado = true;
                        this.actualizarMiEstadoBD();

                        db.collection("menorca_discrecional").onSnapshot(snap => {
                            const lista =[];
                            snap.forEach(doc => {
                                const data = doc.data();
                                if(doc.id !== this.miBus && (this.miLinea === 'General' || data.linea === this.miLinea || data.linea === 'General')) {
                                    if(data.timestamp > Date.now() - (12 * 60 * 60 * 1000)) lista.push({ id: doc.id, ...data });
                                }
                            });
                            this.compañeros = lista.sort((a,b) => b.timestamp - a.timestamp);
                        });

                        db.collection("menorca_discrecional_radio").orderBy("timestamp", "desc").limit(1)
                            .onSnapshot(snap => {
                                if(snap.empty) return;
                                const msg = snap.docs[0].data();
                                const msgId = snap.docs[0].id;
                                
                                if (msg.bus !== this.miBus && this.streamingMsgId !== msgId && (this.miLinea === 'General' || msg.linea === this.miLinea || msg.linea === 'General')) {
                                    this.streamingMsgId = msgId;
                                    this.ultimoAudio = msg.audioBase64; 
                                    this.reproducirMensaje(msg.audioBase64, msg.bus);
                                }
                            });
                            
                        navigator.mediaDevices.getUserMedia({ audio: true }).catch(e => console.log("Mic pendiente"));
                    }).catch((error) => { 
                        this.conectado = false; this.sesionIniciada = false;
                        alert("❌ Error de red: " + error.message); 
                    });
                },

                cerrarTurno() {
                    if(confirm("¿Desconectar del servicio de Tráfico?")) {
                        db.collection("menorca_discrecional").doc(this.miBus).delete();
                        localStorage.removeItem('mb_discrecional_bus');
                        location.reload();
                    }
                },

                cambiarPasajeros(valor) { this.miPax = Math.max(0, this.miPax + valor); this.actualizarMiEstadoBD(); },

                actualizarEstadoServicio(estado) {
                    this.miEstadoServicio = estado;
                    this.actualizarMiEstadoBD();
                    if ("vibrate" in navigator) navigator.vibrate(40);
                },

                toggleAlerta(tipo) {
                    if (this.miAlerta === tipo) this.miAlerta = null; 
                    else this.miAlerta = tipo; 
                    this.actualizarMiEstadoBD();
                    if ("vibrate" in navigator) navigator.vibrate(60);
                },

                actualizarMiEstadoBD() {
                    if(!this.conectado) return;
                    db.collection("menorca_discrecional").doc(this.miBus).set({
                        linea: this.miLinea,
                        pax: this.miPax,
                        ubicacion: this.miUbicacion || 'En Ruta',
                        estadoRuta: this.miEstadoServicio,
                        alerta: this.miAlerta,
                        timestamp: Date.now()
                    });
                },

                empezarGrabar() {
                    if (this.estadoRadio !== 'reposo') return; 
                    
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        this.estadoRadio = 'grabando';
                        if ("vibrate" in navigator) navigator.vibrate(80); 

                        this.chunks =[];
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.mediaRecorder.ondataavailable = e => { this.chunks.push(e.data); };

                        this.mediaRecorder.onstop = async () => {
                            const audioBlob = new Blob(this.chunks, { type: 'audio/webm' });
                            const base64Audio = await this.blobToBase64(audioBlob);

                            db.collection("menorca_discrecional_radio").add({
                                bus: this.miBus,
                                linea: this.miLinea, 
                                audioBase64: base64Audio,
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });
                            
                            stream.getTracks().forEach(track => track.stop());
                        };
                        this.mediaRecorder.start();
                    }).catch(err => { alert("Permite el uso de micrófono."); });
                },

                pararGrabar() {
                    if (this.estadoRadio === 'grabando' && this.mediaRecorder) {
                        this.mediaRecorder.stop();
                        this.estadoRadio = 'reposo';
                    }
                },

                pararGrabarSiSale() { this.pararGrabar(); },

                reproducirMensaje(base64, busSender) {
                    this.estadoRadio = 'recibiendo';
                    this.elQueHabla = busSender;
                    if ("vibrate" in navigator) navigator.vibrate([80, 80]); 
                    
                    this.playAudioAviso('roger');
                    
                    setTimeout(() => {
                        const audio = new Audio(base64);
                        audio.play().catch(e => console.log("Bloqueado"));
                        audio.onended = () => { this.estadoRadio = 'reposo'; this.elQueHabla = null; };
                    }, 500); 
                },

                repetirUltimoAudio() {
                    if (!this.ultimoAudio || this.estadoRadio !== 'reposo') return;
                    this.estadoRadio = 'recibiendo';
                    const audio = new Audio(this.ultimoAudio);
                    audio.play().catch(e => console.log("Ocupado"));
                    audio.onended = () => { this.estadoRadio = 'reposo'; };
                },

                blobToBase64(blob) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
                },

                playAudioAviso(tipo) {
                    try {
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        
                        if(tipo === 'roger') {
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(1000, ctx.currentTime);
                            osc.frequency.setValueAtTime(0, ctx.currentTime + 0.08); 
                            osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.12); 
                            gain.gain.setValueAtTime(0.3, ctx.currentTime);
                            osc.start(); osc.stop(ctx.currentTime + 0.25);
                        } else if (tipo === 'connect') {
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(900, ctx.currentTime);
                            gain.gain.setValueAtTime(0.2, ctx.currentTime);
                            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                            osc.start(); osc.stop(ctx.currentTime + 0.4);
                        }
                    } catch (e) {}
                }
            }
        }
    </script>
